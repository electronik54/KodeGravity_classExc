name: --build workflow for dev--

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: --Checkout--
        uses: actions/checkout@v3

      - name: --Setup JDK--
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: --Maven build--
        run: mvn clean install